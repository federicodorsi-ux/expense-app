<script>
  let spese = [
    { nome: "Affitto", importo: 800 },
    { nome: "Cibo", importo: 300 },
    { nome: "Netflix", importo: 15 }
  ];

  const lista = document.getElementById("lista");

  function render() {
    lista.innerHTML = "";
    let totale = 0;

    spese.forEach(s => {
      const li = document.createElement("li");
      li.textContent = s.nome + ": €" + s.importo;
      lista.appendChild(li);
      totale += s.importo;
    });

    document.getElementById("totale").textContent = "Totale: €" + totale;
  }

  function aggiungiSpesa() {
    const nome = document.getElementById("nome").value;
    const importo = Number(document.getElementById("importo").value);

    spese.push({ nome, importo });

    render();
  }

  render();
</script>
