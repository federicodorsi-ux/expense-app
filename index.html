<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script>
  const supabase = window.supabase.createClient(
    "https://zcrjawwpdjbbkitfabjj.supabase.co",
    "sb_publishable_Rim_qHCOI5MG_dvowMQfrQ_qY20q7Ul"
  );

  const lista = document.getElementById("lista");

  async function render() {
    lista.innerHTML = "";
    let totale = 0;

    const { data: spese } = await supabase
      .from("spese")
      .select("*");

    spese.forEach(s => {
      const li = document.createElement("li");
      li.textContent = s.nome + ": €" + s.importo;
      lista.appendChild(li);
      totale += s.importo;
    });

    document.getElementById("totale").textContent = "Totale: €" + totale;
  }

  async function aggiungiSpesa() {
    const nome = document.getElementById("nome").value;
    const importo = Number(document.getElementById("importo").value);

    if (!nome || !importo) {
      alert("Inserisci nome e importo");
      return;
    }

    await supabase.from("spese").insert([
      { nome, importo }
    ]);

    render();
  }

  render();
</script>
