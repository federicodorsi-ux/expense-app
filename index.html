<!DOCTYPE html>
<html>
<head>
  <title>Expense App</title>
</head>

<body>
  <h1>Le mie spese</h1>

  <input id="nome" placeholder="Nome spesa">
  <input id="importo" type="number" placeholder="Importo">
  <button id="btn">Aggiungi</button>

  <ul id="lista"></ul>
  <h3 id="totale"></h3>

  <!-- Supabase -->
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

  <script>
    // NON usare window.supabase
    const supabaseClient = supabase.createClient(
      "https://zcrjawwpdjbbkitfabjj.supabase.co",
      "sb_publishable_Rim_qHCOI5MG_dvowMQfrQ_qY20q7Ul"
    );

    const lista = document.getElementById("lista");
    const btn = document.getElementById("btn");

    async function render() {
      lista.innerHTML = "";
      let totale = 0;

      const { data, error } = await supabaseClient
        .from("Spese")
        .select("*");

      if (error) {
        console.error(error);
        alert("Errore DB");
        return;
      }

      data.forEach(s => {
        const li = document.createElement("li");
        li.textContent = s.nome + ": €" + s.importo;
        lista.appendChild(li);
        totale += s.importo;
      });

      document.getElementById("totale").textContent = "Totale: €" + totale;
    }

    async function aggiungiSpesa() {
      const nome = document.getElementById("nome").value;
      const importo = Number(document.getElementById("importo").value);

      if (!nome || !importo) {
        alert("Inserisci dati");
        return;
      }

      const { error } = await supabaseClient
        .from("Spese")
        .insert([{ nome, importo }]);

      if (error) {
        console.error(error);
        alert(error.message);
        return;
      }

      document.getElementById("nome").value = "";
      document.getElementById("importo").value = "";

      render();
    }

    // invece di onclick (più stabile)
    btn.addEventListener("click", aggiungiSpesa);

    render();
  </script>
</body>
</html>
