<!DOCTYPE html>
<html>
<head>
  <title>Expense App</title>
</head>

<body>
  <h1>Le mie spese</h1>

  <input id="nome" placeholder="Nome spesa">
  <input id="importo" type="number" placeholder="Importo">
  <button onclick="aggiungiSpesa()">Aggiungi</button>

  <ul id="lista"></ul>
  <h3 id="totale"></h3>

  <!-- Supabase -->
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  
  <script>
    console.log("SUPABASE:", window.supabase);
    const supabase = window.supabase.createClient(
      "https://zcrjawwpdjbbkitfabjj.supabase.co",
      "sb_publishable_Rim_qHCOI5MG_dvowMQfrQ_qY20q7Ul"
    );

    const lista = document.getElementById("lista");

    async function render() {
      lista.innerHTML = "";
      let totale = 0;

      const { data: spese, error } = await supabase
        .from("spese")
        .select("*");

      if (error) {
        console.error(error);
        alert("Errore nel caricamento dati");
        return;
      }

      spese.forEach(s => {
        const li = document.createElement("li");
        li.textContent = s.nome + ": €" + s.importo;
        lista.appendChild(li);
        totale += s.importo;
      });

      document.getElementById("totale").textContent = "Totale: €" + totale;
    }

    async function aggiungiSpesa() {
      const nome = document.getElementById("nome").value;
      const importo = Number(document.getElementById("importo").value);

      if (!nome || !importo) {
        alert("Inserisci nome e importo");
        return;
      }

      const { error } = await supabase
        .from("spese")
        .insert([{ nome, importo }]);

      if (error) {
        console.error(error);
        alert("Errore salvataggio");
        return;
      }

      // reset input
      document.getElementById("nome").value = "";
      document.getElementById("importo").value = "";

      render();
    }

    render();
  </script>
</body>
</html>
